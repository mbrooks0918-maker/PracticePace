<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img">
  <title>PracticePace</title>
  <desc>PracticePace logo — speed bars with full wordmark in red and white on dark background</desc>

  <!-- Speed bars — 4 bars growing right with arrow cap -->
  <rect x="0" y="8"  width="18" height="10" rx="2" fill="#cc1111" opacity="0.3"/>
  <rect x="0" y="24" width="36" height="10" rx="2" fill="#cc1111" opacity="0.55"/>
  <rect x="0" y="40" width="58" height="10" rx="2" fill="#cc1111" opacity="0.78"/>
  <rect x="0" y="56" width="82" height="10" rx="2" fill="#cc1111"/>
  <!-- Arrow cap on longest bar -->
  <polygon points="82,56 98,61 82,66" fill="#cc1111"/>

  <!-- Wordmark -->
  <text x="114" y="46" font-family="'Bebas Neue',Arial Black,sans-serif" font-size="44" fill="white" letter-spacing="3">PRACTICE</text>
  <text x="114" y="76" font-family="'Bebas Neue',Arial Black,sans-serif" font-size="44" fill="#cc1111" letter-spacing="3">PACE</text>
</svg>
